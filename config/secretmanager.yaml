# file: config/secretmanager.yaml
# author: Stephen Boyett
# company: Axovia AI
# date: 2026-04-12
# version: 1.0
# brief: Single source of truth for GCP Secret Manager secrets.
#
# description:
#   Defines all secrets stored in GCP Secret Manager for Flipper.ai,
#   organized by environment scope. Read by scripts/secretmanager.py
#   at container startup and by CLI tooling (validate, populate, audit).
#
#   Naming convention in GCP: {SCOPE}_{SECRET_NAME}
#   Example: PRODUCTION_DATABASE_URL, STAGING_STRIPE_SECRET_KEY

stored-secrets:
  environments:

    # ── Secrets shared across ALL environments ───────────────────────
    all:
      # Firebase public config (safe for client bundle, but managed centrally)
      firebase-auth-domain:
        name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        description: Firebase Auth domain (axovia-flipper.firebaseapp.com)
      firebase-project-id:
        name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        description: Firebase project ID (axovia-flipper)
      firebase-storage-bucket:
        name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        description: Firebase Storage bucket
      firebase-messaging-sender-id:
        name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        description: Firebase Cloud Messaging sender ID
      firebase-app-id:
        name: NEXT_PUBLIC_FIREBASE_APP_ID
        description: Firebase app ID
      firebase-vapid-key:
        name: NEXT_PUBLIC_FIREBASE_VAPID_KEY
        description: Firebase Cloud Messaging VAPID key for web push

    # ── Production secrets ───────────────────────────────────────────
    production:
      # Database
      database-url:
        name: DATABASE_URL
        description: Cloud SQL PostgreSQL connection string (REQUIRED)

      # Auth & encryption
      encryption-secret:
        name: ENCRYPTION_SECRET
        description: General encryption key for sensitive data at rest (REQUIRED)
      app-url:
        name: APP_URL
        description: Production app URL for email links, Stripe redirects

      # Firebase Admin SDK
      firebase-api-key:
        name: NEXT_PUBLIC_FIREBASE_API_KEY
        description: Firebase client API key
      firebase-client-email:
        name: FIREBASE_CLIENT_EMAIL
        description: Firebase Admin SDK service account email
      firebase-private-key:
        name: FIREBASE_PRIVATE_KEY
        description: Firebase Admin SDK private key (PEM)

      # OAuth providers
      google-client-id:
        name: GOOGLE_CLIENT_ID
        description: Google OAuth client ID
      google-client-secret:
        name: GOOGLE_CLIENT_SECRET
        description: Google OAuth client secret
      github-client-id:
        name: GITHUB_CLIENT_ID
        description: GitHub OAuth client ID
      github-client-secret:
        name: GITHUB_CLIENT_SECRET
        description: GitHub OAuth client secret
      facebook-app-id:
        name: FACEBOOK_APP_ID
        description: Facebook OAuth app ID
      facebook-app-secret:
        name: FACEBOOK_APP_SECRET
        description: Facebook OAuth app secret
      hcaptcha-secret-key:
        name: HCAPTCHA_SECRET_KEY
        description: hCaptcha server-side verification key

      # AI providers
      openai-api-key:
        name: OPENAI_API_KEY
        description: OpenAI API key (premium AI provider)
      anthropic-api-key:
        name: ANTHROPIC_API_KEY
        description: Anthropic Claude API key (premium AI provider)
      claude-api-key:
        name: CLAUDE_API_KEY
        description: Fallback for ANTHROPIC_API_KEY
      google-api-key:
        name: GOOGLE_API_KEY
        description: Google Gemini API key (primary free AI provider)
      groq-api-key:
        name: GROQ_API_KEY
        description: Groq API key (fast free AI provider — Llama 3.3 70B)
      flipper-api-keys:
        name: FLIPPER_API_KEYS
        description: Internal API key(s) for Flipper.ai service-to-service auth

      # Payments (Stripe)
      stripe-secret-key:
        name: STRIPE_SECRET_KEY
        description: Stripe secret API key
      stripe-webhook-secret:
        name: STRIPE_WEBHOOK_SECRET
        description: Stripe webhook endpoint signing secret
      stripe-price-flipper:
        name: STRIPE_PRICE_FLIPPER
        description: Stripe Price ID for Flipper subscription tier
      stripe-price-pro:
        name: STRIPE_PRICE_PRO
        description: Stripe Price ID for Pro subscription tier

      # Email
      resend-api-key:
        name: RESEND_API_KEY
        description: Resend transactional email API key

      # Monitoring & error tracking
      sentry-dsn:
        name: SENTRY_DSN
        description: Sentry error tracking DSN
      sentry-dsn-public:
        name: NEXT_PUBLIC_SENTRY_DSN
        description: Sentry DSN exposed in client bundle
      sentry-auth-token:
        name: SENTRY_AUTH_TOKEN
        description: Sentry auth token for source map uploads (build-time only)
      monitoring-api-key:
        name: MONITORING_API_KEY
        description: Bearer token for Cloud Scheduler → /api/monitoring/run
      notifications-process-api-key:
        name: NOTIFICATIONS_PROCESS_API_KEY
        description: Bearer token for Cloud Scheduler → /api/notifications/process

      # Marketplace scrapers
      ebay-oauth-token:
        name: EBAY_OAUTH_TOKEN
        description: eBay Browse API OAuth bearer token

      # Logistics & shipping
      shippo-api-token:
        name: SHIPPO_API_TOKEN
        description: Shippo carrier rate estimation API token
      geoapify-api-key:
        name: GEOAPIFY_API_KEY
        description: Geoapify geocoding API key for pickup distance

      # Google Calendar integration (Story 12.1)
      google-calendar-client-id:
        name: GOOGLE_CALENDAR_CLIENT_ID
        description: Google Calendar OAuth client ID
      google-calendar-client-secret:
        name: GOOGLE_CALENDAR_CLIENT_SECRET
        description: Google Calendar OAuth client secret
      google-maps-api-key:
        name: GOOGLE_MAPS_API_KEY
        description: Google Maps Directions API key (Story 12.2)

      # SMS notifications (Story 11.2)
      twilio-account-sid:
        name: TWILIO_ACCOUNT_SID
        description: Twilio Account SID (starts with AC)
      twilio-auth-token:
        name: TWILIO_AUTH_TOKEN
        description: Twilio auth token
      twilio-from-number:
        name: TWILIO_FROM_NUMBER
        description: Twilio-purchased phone number in E.164 format

    # ── Staging secrets (mirrors production structure) ────────────────
    staging:
      database-url:
        name: DATABASE_URL
        description: Staging Cloud SQL connection string (REQUIRED)
      encryption-secret:
        name: ENCRYPTION_SECRET
        description: Staging encryption key (REQUIRED)
      app-url:
        name: APP_URL
        description: Staging app URL
      firebase-api-key:
        name: NEXT_PUBLIC_FIREBASE_API_KEY
        description: Staging Firebase client API key
      firebase-client-email:
        name: FIREBASE_CLIENT_EMAIL
        description: Staging Firebase Admin SDK email
      firebase-private-key:
        name: FIREBASE_PRIVATE_KEY
        description: Staging Firebase Admin SDK private key
      google-api-key:
        name: GOOGLE_API_KEY
        description: Google Gemini API key (staging)
      groq-api-key:
        name: GROQ_API_KEY
        description: Groq API key (staging)
      stripe-secret-key:
        name: STRIPE_SECRET_KEY
        description: Stripe test-mode secret key (staging)
      stripe-webhook-secret:
        name: STRIPE_WEBHOOK_SECRET
        description: Stripe test-mode webhook secret (staging)
      resend-api-key:
        name: RESEND_API_KEY
        description: Resend API key (staging)
      sentry-dsn:
        name: SENTRY_DSN
        description: Sentry DSN (staging project)
      monitoring-api-key:
        name: MONITORING_API_KEY
        description: Monitoring scheduler auth key (staging)
      ebay-oauth-token:
        name: EBAY_OAUTH_TOKEN
        description: eBay sandbox OAuth token (staging)

    # ── Dev-only secrets (local development overrides) ────────────────
    dev:
      database-url:
        name: DATABASE_URL
        description: Local PostgreSQL connection string
      encryption-secret:
        name: ENCRYPTION_SECRET
        description: Local encryption key (can be any 32+ char string)
