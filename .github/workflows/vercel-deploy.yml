# DEPRECATED: Cloud Run is now the primary deployment target. See ci.yml for the Cloud Run deploy job.
# This workflow is retained as a manual fallback only.
name: Vercel Deploy (DEPRECATED)

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (preview or production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview:
    if: github.event.inputs.deploy_target == 'preview'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"
          echo "### 🔗 Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "[$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with Preview URL
        if: false
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n${process.env.PREVIEW_URL}`
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview-url }}

  production:
    if: github.event.inputs.deploy_target == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://flipper-ai.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "### 🚀 Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "[$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Health Check
        run: |
          sleep 10
          curl -sf https://flipper-ai.vercel.app/api/health || echo "⚠️ Health check pending"
