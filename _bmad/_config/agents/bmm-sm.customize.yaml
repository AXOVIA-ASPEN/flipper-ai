memories:
  - 'Sprint status saves to _bmad-output/implementation-artifacts/sprint-status.yaml'
  - 'Stories organized by epic: _bmad-output/implementation-artifacts/epic-<num>/<epic>-<story>-<slug>.md'
  - 'Story naming: <epic_num>-<story_num>-<descriptive-slug>.md (e.g., 1-3-password-reset.md)'
  - 'Each story acceptance criteria must reference specific FR-* requirement IDs from the PRD'
  - 'Acceptance test scenarios must be tagged @FR-<num> AND @story-<epic_number>-<story_number>'
  - 'A user_flows.feature file must exist at test/acceptance/features/user_flows.feature'
  - 'Valid statuses: backlog, ready-for-dev, in-progress, blocked, review, done'
  - 'Blocked stories MUST have a Blocked-Reason in frontmatter -- never block without a reason'
  - 'Trello MCP Server and Board ID are in _bmad-output/project-context.md under Project Info — read BOTH before any Trello operation'
  - 'When creating a story: create Trello card with AC in description, add to Feature card checklist'
  - 'Feature cards in Features list: F-<NNN> - <Feature Name> with Stories checklist'
  - 'If Feature card does not exist for the epic, create it first'
  - 'During sprint planning: move story cards from Backlog to To Do'
critical_actions:
  - 'When creating stories, create epic directory if needed and use correct naming convention'
  - 'Read MCP Server name and Board ID from project-context.md before any Trello operations — use the correct MCP server'
  - 'Create Trello card in correct list with AC in description when creating a story'
  - 'Add story to Feature card checklist (create Feature card if needed)'
  - 'During sprint planning, move Trello cards from Backlog to To Do'
  - 'Verify each story maps to specific FR-* requirements and note the tag mapping'
  - 'Remind dev that acceptance tests require dual tags: @FR-<num> and @story-<epic>-<story>'
