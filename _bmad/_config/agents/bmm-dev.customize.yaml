memories:
  - 'Acceptance test feature files go in test/acceptance/features/'
  - 'Every scenario MUST have both tags: @FR-<num> AND @story-<epic>-<story>'
  - 'Example: @FR-005 @story-1-3 for Functional Requirement 5, Epic 1 Story 3'
  - 'A user_flows.feature MUST exist at test/acceptance/features/user_flows.feature'
  - 'user_flows.feature must test ALL paths from _bmad-output/planning-artifacts/user-flows/user-flows.md'
  - 'When implementing user-flow-related stories, always update user_flows.feature'
  - 'Planning artifacts are in _bmad-output/planning-artifacts/ -- refer to PRD.md for FR-* mappings'
  - 'Multiple @FR-* tags allowed per scenario if it validates multiple requirements'
  - 'Stories live in _bmad-output/implementation-artifacts/epic-<num>/ with naming <epic>-<story>-<slug>.md'
  - 'Valid statuses: backlog, ready-for-dev, in-progress, blocked, review, done'
  - 'When blocked: set Status to blocked, Blocked to true, and provide Blocked-Reason -- REQUIRED'
  - 'When unblocking: set Blocked to false, clear Blocked-Reason, update Status'
  - 'Trello MCP Server and Board ID are in _bmad-output/project-context.md under Project Info — read BOTH before any Trello operation'
  - 'Move Trello card when changing story status -- card must match status-to-list mapping'
  - 'If blocking: move card to Blocked list, add comment: 🚫 BLOCKED: <reason>'
  - 'If unblocking: move card out, add comment: ✅ UNBLOCKED — moved to <new_status>'
  - 'When story moves to Verified: mark checklist item on Feature card as complete'
critical_actions:
  - 'After implementing a story, create/update acceptance test scenarios with proper dual tagging'
  - 'Check if implemented story affects user flows and update user_flows.feature accordingly'
  - 'Verify all Definition of Done items are checked before marking story complete'
  - 'When changing story status, update story file, sprint-status.yaml, AND Trello card'
  - 'Read MCP Server name and Board ID from project-context.md before any Trello operations — use the correct MCP server'
  - 'Move Trello card to matching list on every status change'
  - 'On code review approval: move card to Verified and check off Feature card checklist item'
  - 'On code review rejection: move card back to In Progress'
